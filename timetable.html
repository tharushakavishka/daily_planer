<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #000000;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
            animation: fadeIn 1s ease-out;
        }

        .header h1 {
            font-family: 'Brush Script MT', 'cursive', serif;
            font-size: 3.5rem;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 2px;
            animation: pulse 3s ease-in-out infinite;
        }

        /* Decorative circles */
        .header::before,
        .header::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            top: 20px;
        }

        .header::before {
            left: 20px;
            clip-path: circle(50% at 0 50%);
        }

        .header::after {
            right: 20px;
            clip-path: circle(50% at 100% 50%);
        }

        .header h1 {
            font-family: 'Brush Script MT', 'cursive', serif;
            font-size: 3.5rem;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .day-btn {
            background: transparent;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        .day-btn:nth-child(1) { animation-delay: 0.1s; }
        .day-btn:nth-child(2) { animation-delay: 0.2s; }
        .day-btn:nth-child(3) { animation-delay: 0.3s; }
        .day-btn:nth-child(4) { animation-delay: 0.4s; }
        .day-btn:nth-child(5) { animation-delay: 0.5s; }
        .day-btn:nth-child(6) { animation-delay: 0.6s; }
        .day-btn:nth-child(7) { animation-delay: 0.7s; }

        .day-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
        }

        .day-btn.active {
            color: #ffffff;
            animation: glow 2s ease-in-out infinite;
        }

        .day-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Day Dots */
        .day-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .day-dot {
            width: 8px;
            height: 8px;
            background: #4a4a4a;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-out backwards;
        }

        .day-dot:nth-child(1) { animation-delay: 0.1s; }
        .day-dot:nth-child(2) { animation-delay: 0.2s; }
        .day-dot:nth-child(3) { animation-delay: 0.3s; }
        .day-dot:nth-child(4) { animation-delay: 0.4s; }
        .day-dot:nth-child(5) { animation-delay: 0.5s; }
        .day-dot:nth-child(6) { animation-delay: 0.6s; }
        .day-dot:nth-child(7) { animation-delay: 0.7s; }

        .day-dot.active {
            background: #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        .day-dot:hover {
            background: #666666;
            transform: scale(1.3);
        }

        .day-dot.active:hover {
            background: #ffffff;
        }

        /* Date Field */
        .date-field {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .date-field label {
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
        }

        .date-field input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #666666;
            color: #ffffff;
            font-size: 1rem;
            padding: 5px 10px;
            width: 180px;
            outline: none;
            transition: all 0.3s;
        }

        .date-field input:focus {
            border-bottom-color: #ffffff;
            box-shadow: 0 5px 10px -5px rgba(255, 255, 255, 0.3);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 30px;
            padding: 0 20px;
            transition: all 0.3s ease-out;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            margin-bottom: 25px;
            animation: fadeIn 0.8s ease-out backwards;
        }

        .left-column .section {
            animation-delay: 0.3s;
        }

        .right-column .section:nth-child(1) {
            animation-delay: 0.4s;
        }

        .right-column .section:nth-child(2) {
            animation-delay: 0.5s;
        }

        .right-column .section:nth-child(3) {
            animation-delay: 0.6s;
        }

        .section-title {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Schedules */
        .schedules-wrapper {
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .schedule-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            animation: slideIn 0.5s ease-out backwards;
        }

        .schedule-row:nth-child(1) { animation-delay: 0.1s; }
        .schedule-row:nth-child(2) { animation-delay: 0.15s; }
        .schedule-row:nth-child(3) { animation-delay: 0.2s; }
        .schedule-row:nth-child(4) { animation-delay: 0.25s; }
        .schedule-row:nth-child(5) { animation-delay: 0.3s; }
        .schedule-row:nth-child(6) { animation-delay: 0.35s; }
        .schedule-row:nth-child(7) { animation-delay: 0.4s; }
        .schedule-row:nth-child(8) { animation-delay: 0.45s; }
        .schedule-row:nth-child(9) { animation-delay: 0.5s; }
        .schedule-row:nth-child(10) { animation-delay: 0.55s; }
        .schedule-row:nth-child(11) { animation-delay: 0.6s; }
        .schedule-row:nth-child(12) { animation-delay: 0.65s; }
        .schedule-row:nth-child(13) { animation-delay: 0.7s; }
        .schedule-row:nth-child(14) { animation-delay: 0.75s; }
        .schedule-row:nth-child(15) { animation-delay: 0.8s; }
        .schedule-row:nth-child(16) { animation-delay: 0.85s; }
        .schedule-row:nth-child(17) { animation-delay: 0.9s; }
        .schedule-row:nth-child(18) { animation-delay: 0.95s; }

        .schedule-time {
            color: #ffffff;
            font-size: 0.9rem;
            min-width: 55px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .schedule-row:hover .schedule-time {
            color: #667eea;
            transform: translateX(5px);
        }

        .schedule-line {
            flex: 1;
            height: 2px;
            background: #4a4a4a;
            position: relative;
            transition: all 0.3s;
        }

        .schedule-row:hover .schedule-line {
            background: #666666;
            height: 3px;
        }

        .schedule-input {
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            padding: 5px 0;
            transition: all 0.3s;
        }

        .schedule-input:focus {
            transform: translateX(5px);
        }

        .schedule-input::placeholder {
            color: #666666;
        }

        /* Priorities */
        .priorities-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .priority-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .priority-dots {
            display: flex;
            gap: 5px;
            min-width: 40px;
        }

        .priority-dot {
            width: 10px;
            height: 10px;
            background: #4a4a4a;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
        }

        .priority-dot:hover {
            transform: scale(1.4);
        }

        .priority-dot.high {
            background: #ff6b6b;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-dot.medium {
            background: #ffd93d;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-dot.low {
            background: #6bcb77;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-line {
            flex: 1;
            height: 2px;
            background: #4a4a4a;
            position: relative;
        }

        .priority-input {
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            padding: 5px 0;
        }

        .priority-input::placeholder {
            color: #666666;
        }

        /* To-Do List */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .todo-item {
            background: #e8e0d0;
            padding: 12px 15px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 45px;
            transition: all 0.3s;
            animation: slideIn 0.5s ease-out backwards;
        }

        .todo-item:nth-child(1) { animation-delay: 0.1s; }
        .todo-item:nth-child(2) { animation-delay: 0.15s; }
        .todo-item:nth-child(3) { animation-delay: 0.2s; }
        .todo-item:nth-child(4) { animation-delay: 0.25s; }
        .todo-item:nth-child(5) { animation-delay: 0.3s; }
        .todo-item:nth-child(6) { animation-delay: 0.35s; }
        .todo-item:nth-child(7) { animation-delay: 0.4s; }
        .todo-item:nth-child(8) { animation-delay: 0.45s; }

        .todo-item:hover {
            transform: translateX(5px);
            box-shadow: 2px 2px 8px rgba(232, 224, 208, 0.3);
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .todo-checkbox:hover {
            transform: scale(1.2);
        }

        .todo-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #1a1a2e;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .todo-input::placeholder {
            color: #666666;
        }

        .todo-input.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Notes */
        .notes-area {
            width: 100%;
            height: 180px;
            background: #e8e0d0;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 0.95rem;
            color: #1a1a2e;
            resize: vertical;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
            transition: all 0.3s;
        }

        .notes-area:focus {
            box-shadow: 0 0 0 3px rgba(232, 224, 208, 0.5);
            transform: scale(1.02);
        }

        .notes-area::placeholder {
            color: #666666;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 25px 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 22px;
            border: 2px solid #ffffff;
            background: transparent;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn-save:hover {
            background: #6bcb77;
            border-color: #6bcb77;
            color: #ffffff;
        }

        .btn-clear:hover {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #ffffff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #666666;
            font-size: 0.9rem;
        }

        .footer span {
            color: #ffffff;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #6bcb77;
            color: #fff;
            padding: 12px 20px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-size: 0.9rem;
            animation: pulse 0.5s ease-out;
        }

        .notification.show {
            transform: translateX(0);
        }

        .add-more-btn {
            background: transparent;
            color: #666666;
            border: 1px solid #4a4a4a;
            padding: 8px 15px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .add-more-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
            transform: translateX(5px);
            box-shadow: 3px 0 10px rgba(255, 255, 255, 0.2);
        }

        .add-more-btn:active {
            transform: translateX(3px);
        }

        /* Export mode - hide buttons when exporting */
        body.exporting .action-buttons,
        body.exporting .add-more-btn {
            display: none !important;
        }

        body.exporting .container {
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>daily planner</h1>

            <div class="day-selector">
                <button class="day-btn active" data-day="monday">M</button>
                <button class="day-btn" data-day="tuesday">T</button>
                <button class="day-btn" data-day="wednesday">W</button>
                <button class="day-btn" data-day="thursday">T</button>
                <button class="day-btn" data-day="friday">F</button>
                <button class="day-btn" data-day="saturday">S</button>
                <button class="day-btn" data-day="sunday">S</button>
            </div>

            <div class="day-dots">
                <div class="day-dot active" data-day="monday"></div>
                <div class="day-dot" data-day="tuesday"></div>
                <div class="day-dot" data-day="wednesday"></div>
                <div class="day-dot" data-day="thursday"></div>
                <div class="day-dot" data-day="friday"></div>
                <div class="day-dot" data-day="saturday"></div>
                <div class="day-dot" data-day="sunday"></div>
            </div>

            <div class="date-field">
                <label for="date">Date :</label>
                <input type="date" id="date">
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left Column: Schedules -->
            <div class="left-column">
                <div class="section">
                    <h2 class="section-title">Schedules</h2>
                    <div class="schedules-wrapper" id="schedules-container">
                    </div>
                </div>
            </div>

            <!-- Right Column: Priorities, To-Do, Notes -->
            <div class="right-column">
                <div class="section">
                    <h2 class="section-title">Top Priorities</h2>
                    <div class="priorities-list" id="priorities-container">
                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="0">
                            </div>
                        </div>
                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="1">
                            </div>
                        </div>
                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="2">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h2 class="section-title">To-Do List</h2>
                    <div class="todo-list" id="todo-container">
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                    </div>
                    <button class="add-more-btn" onclick="addTodo()">+ Add more</button>
                </div>

                <div class="section">
                    <h2 class="section-title">Notes</h2>
                    <textarea class="notes-area" id="notes" placeholder=""></textarea>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-save" onclick="saveDay()">Save</button>
            <button class="btn" onclick="loadDay()">Load</button>
            <button class="btn btn-clear" onclick="clearDay()">Clear</button>
            <button class="btn" onclick="exportAsImage()" style="border-color: #667eea;">📷 Export Image</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>@dailyplanner</span>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        let currentDay = 'monday';
        let priorityStates = [[0,0,0], [0,0,0], [0,0,0]];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;

            // Generate time slots
            generateTimeSlots();

            // Load saved data for Monday
            loadDay();
        });

        // Generate Time Slots
        function generateTimeSlots() {
            const container = document.getElementById('schedules-container');
            container.innerHTML = '';

            const timeSlots = [
                '6:00', '7:00', '8:00', '9:00', '10:00', '11:00',
                '12:00', '1:00', '2:00', '3:00', '4:00', '5:00',
                '6:00', '7:00', '8:00', '9:00', '10:00', '11:00'
            ];

            timeSlots.forEach((time, index) => {
                const scheduleRow = document.createElement('div');
                scheduleRow.className = 'schedule-row';
                scheduleRow.innerHTML = `
                    <span class="schedule-time">${time}</span>
                    <div class="schedule-line">
                        <input type="text" class="schedule-input" placeholder="" data-index="${index}">
                    </div>
                `;
                container.appendChild(scheduleRow);
            });
        }

        // Day Selection
        document.querySelectorAll('.day-btn, .day-dot').forEach(element => {
            element.addEventListener('click', function() {
                // Save current day before switching
                saveDay();

                // Fade out main content
                const mainContent = document.querySelector('.main-content');
                mainContent.style.opacity = '0';
                mainContent.style.transform = 'translateY(10px)';
                mainContent.style.transition = 'all 0.3s ease-out';

                setTimeout(() => {
                    // Update current day
                    currentDay = this.dataset.day;

                    // Update UI
                    document.querySelectorAll('.day-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if(btn.dataset.day === currentDay) btn.classList.add('active');
                    });

                    document.querySelectorAll('.day-dot').forEach(dot => {
                        dot.classList.remove('active');
                        if(dot.dataset.day === currentDay) dot.classList.add('active');
                    });

                    // Load new day's data
                    loadDay();

                    // Fade in main content
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                        mainContent.style.transform = 'translateY(0)';
                    }, 50);
                }, 300);
            });
        });

        // Add To-Do
        function addTodo() {
            const container = document.getElementById('todo-container');
            const todoItem = document.createElement('div');
            todoItem.className = 'todo-item';
            todoItem.style.animation = 'slideIn 0.5s ease-out';
            todoItem.innerHTML = `
                <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                <input type="text" class="todo-input" placeholder="">
            `;
            container.appendChild(todoItem);

            // Focus on the new input
            setTimeout(() => {
                const input = todoItem.querySelector('.todo-input');
                input.focus();
            }, 100);
        }

        // Toggle To-Do
        function toggleTodo(checkbox) {
            const input = checkbox.nextElementSibling;
            if (checkbox.checked) {
                input.classList.add('completed');
            } else {
                input.classList.remove('completed');
            }
        }

        // Cycle Priority
        function cyclePriority(dot, index) {
            const row = dot.closest('.priority-row');
            const dots = row.querySelectorAll('.priority-dot');
            const input = row.querySelector('.priority-input');
            const rowIndex = Array.from(document.querySelectorAll('.priority-row')).indexOf(row);

            // Toggle this dot
            if (dot.classList.contains('high')) {
                dot.classList.remove('high');
                priorityStates[rowIndex][index] = 0;
            } else {
                // Clear all dots in this row
                dots.forEach(d => d.classList.remove('high', 'medium', 'low'));
                // Set this dot as high
                dot.classList.add('high');
                priorityStates[rowIndex] = [0, 0, 0];
                priorityStates[rowIndex][index] = 3;
            }
        }

        // Save Day
        function saveDay() {
            const data = {
                date: document.getElementById('date').value,
                schedules: [],
                priorities: [],
                todos: [],
                notes: document.getElementById('notes').value
            };

            // Collect schedules
            document.querySelectorAll('.schedule-input').forEach(input => {
                const value = input.value.trim();
                if (value) {
                    data.schedules.push({
                        index: input.dataset.index,
                        value: value
                    });
                }
            });

            // Collect priorities
            document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                const input = row.querySelector('.priority-input');
                const value = input.value.trim();
                const dots = row.querySelectorAll('.priority-dot');
                const priorities = [];

                dots.forEach((dot, dotIndex) => {
                    if (dot.classList.contains('high')) priorities.push(3);
                    else if (dot.classList.contains('medium')) priorities.push(2);
                    else if (dot.classList.contains('low')) priorities.push(1);
                    else priorities.push(0);
                });

                if (value || priorities.some(p => p > 0)) {
                    data.priorities.push({
                        index: rowIndex,
                        value: value,
                        priorities: priorities
                    });
                }
            });

            // Collect to-dos
            document.querySelectorAll('.todo-item').forEach((item, index) => {
                const checkbox = item.querySelector('.todo-checkbox').checked;
                const input = item.querySelector('.todo-input');
                const value = input.value.trim();
                if (value) {
                    data.todos.push({
                        index: index,
                        checked: checkbox,
                        value: value
                    });
                }
            });

            // Save to localStorage
            localStorage.setItem(`timetable_v2_${currentDay}`, JSON.stringify(data));
            showNotification('✓ Saved!');
        }

        // Load Day
        function loadDay() {
            const savedData = localStorage.getItem(`timetable_v2_${currentDay}`);

            if (savedData) {
                const data = JSON.parse(savedData);

                // Load date
                if (data.date) {
                    document.getElementById('date').value = data.date;
                }

                // Load schedules
                document.querySelectorAll('.schedule-input').forEach(input => {
                    input.value = '';
                });
                if (data.schedules) {
                    data.schedules.forEach(schedule => {
                        const input = document.querySelector(`.schedule-input[data-index="${schedule.index}"]`);
                        if (input) input.value = schedule.value;
                    });
                }

                // Load priorities
                document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                    const input = row.querySelector('.priority-input');
                    const dots = row.querySelectorAll('.priority-dot');

                    input.value = '';
                    dots.forEach(dot => dot.classList.remove('high', 'medium', 'low'));
                    priorityStates[rowIndex] = [0, 0, 0];
                });

                if (data.priorities) {
                    data.priorities.forEach(priority => {
                        const row = document.querySelectorAll('.priority-row')[priority.index];
                        if (row) {
                            const input = row.querySelector('.priority-input');
                            const dots = row.querySelectorAll('.priority-dot');

                            input.value = priority.value;
                            priority.priorities.forEach((p, i) => {
                                if (p === 3) dots[i].classList.add('high');
                                else if (p === 2) dots[i].classList.add('medium');
                                else if (p === 1) dots[i].classList.add('low');
                            });
                            priorityStates[priority.index] = priority.priorities;
                        }
                    });
                }

                // Load to-dos
                document.querySelectorAll('.todo-item').forEach((item) => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });

                if (data.todos) {
                    data.todos.forEach(todo => {
                        const items = document.querySelectorAll('.todo-item');
                        if (items[todo.index]) {
                            const checkbox = items[todo.index].querySelector('.todo-checkbox');
                            const input = items[todo.index].querySelector('.todo-input');
                            checkbox.checked = todo.checked;
                            input.value = todo.value;
                            if (todo.checked) input.classList.add('completed');
                        }
                    });
                }

                // Load notes
                document.getElementById('notes').value = data.notes || '';

                showNotification('✓ Loaded!');
            } else {
                // Clear all if no data
                document.querySelectorAll('.schedule-input').forEach(input => input.value = '');
                document.querySelectorAll('.priority-input').forEach(input => input.value = '');
                document.querySelectorAll('.priority-dot').forEach(dot => {
                    dot.classList.remove('high', 'medium', 'low');
                });
                document.querySelectorAll('.todo-item').forEach(item => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });
                document.getElementById('notes').value = '';
            }
        }

        // Clear Day
        function clearDay() {
            if (confirm('Clear all data for ' + currentDay + '?')) {
                localStorage.removeItem(`timetable_v2_${currentDay}`);

                // Reset UI
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
                document.getElementById('notes').value = '';

                document.querySelectorAll('.schedule-input').forEach(input => input.value = '');

                document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                    const input = row.querySelector('.priority-input');
                    const dots = row.querySelectorAll('.priority-dot');
                    input.value = '';
                    dots.forEach(dot => dot.classList.remove('high', 'medium', 'low'));
                    priorityStates[rowIndex] = [0, 0, 0];
                });

                document.querySelectorAll('.todo-item').forEach(item => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });

                showNotification('✓ Cleared!');
            }
        }

        // Show Notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Export as Image
        function exportAsImage() {
            // Save before exporting
            saveDay();

            // Add exporting class to hide buttons
            document.body.classList.add('exporting');

            // Wait a bit for the class to take effect
            setTimeout(() => {
                const container = document.querySelector('.container');

                // Use html2canvas to capture
                html2canvas(container, {
                    backgroundColor: '#000000',
                    scale: 2, // Higher quality
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    // Remove exporting class
                    document.body.classList.remove('exporting');

                    // Create download link
                    const link = document.createElement('a');
                    const dayName = currentDay.charAt(0).toUpperCase() + currentDay.slice(1);
                    const date = document.getElementById('date').value;
                    link.download = `DailyPlanner_${dayName}_${date}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    showNotification('✓ Image exported!');
                }).catch(error => {
                    console.error('Export error:', error);
                    document.body.classList.remove('exporting');
                    showNotification('✗ Export failed');
                });
            }, 100);
        }
    </script>
</body>
</html>
