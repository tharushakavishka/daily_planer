<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* Better touch scrolling for mobile */
        @media (max-width: 768px) {
            body {
                -webkit-overflow-scrolling: touch;
            }

            /* Prevent zoom on input focus for iOS */
            input[type="text"],
            input[type="date"],
            textarea {
                font-size: 16px !important;
            }

            /* Smooth scrolling */
            html {
                scroll-behavior: smooth;
            }
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 15px;
            color: #ffffff;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #000000;
            overflow: hidden;
            padding-bottom: 80px;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 25px 15px 20px;
            position: relative;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-family: 'Brush Script MT', 'cursive', serif;
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: pulse 3s ease-in-out infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* Decorative circles - hide on mobile */
        .header::before,
        .header::after {
            display: none;
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .day-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
            min-width: 40px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Day Selector */
        .day-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .day-btn {
            background: transparent;
            color: #ffffff;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            animation: slideIn 0.5s ease-out backwards;
        }

        .day-btn:nth-child(1) { animation-delay: 0.05s; }
        .day-btn:nth-child(2) { animation-delay: 0.1s; }
        .day-btn:nth-child(3) { animation-delay: 0.15s; }
        .day-btn:nth-child(4) { animation-delay: 0.2s; }
        .day-btn:nth-child(5) { animation-delay: 0.25s; }
        .day-btn:nth-child(6) { animation-delay: 0.3s; }
        .day-btn:nth-child(7) { animation-delay: 0.35s; }

        .day-btn:hover {
            color: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px);
        }

        .day-btn.active {
            color: #ffffff;
            animation: glow 2s ease-in-out infinite;
        }

        .day-btn.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background: #ffffff;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Day Dots */
        .day-dots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .day-dot {
            width: 10px;
            height: 10px;
            background: #4a4a4a;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            animation: scaleIn 0.5s ease-out backwards;
            position: relative;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .day-dot:nth-child(1) { animation-delay: 0.1s; }
        .day-dot:nth-child(2) { animation-delay: 0.15s; }
        .day-dot:nth-child(3) { animation-delay: 0.2s; }
        .day-dot:nth-child(4) { animation-delay: 0.25s; }
        .day-dot:nth-child(5) { animation-delay: 0.3s; }
        .day-dot:nth-child(6) { animation-delay: 0.35s; }
        .day-dot:nth-child(7) { animation-delay: 0.4s; }

        .day-dot.active {
            background: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(102, 126, 234, 0.5);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(102, 126, 234, 0.5);
            }
            50% {
                transform: scale(1.2);
                box-shadow: 0 0 20px rgba(255, 255, 255, 1), 0 0 40px rgba(102, 126, 234, 0.7);
            }
        }

        .day-dot:hover {
            background: #666666;
            transform: scale(1.4);
        }

        .day-dot.active:hover {
            background: #ffffff;
        }

        /* Date Field */
        .date-field {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .date-field label {
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .date-field input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            padding: 8px 12px;
            width: 180px;
            outline: none;
            transition: all 0.3s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .date-field input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .date-field {
                margin-bottom: 20px;
                gap: 8px;
            }

            .date-field label {
                font-size: 0.9rem;
            }

            .date-field input {
                font-size: 0.95rem;
                padding: 10px 8px;
                width: 160px;
            }
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 30px;
            padding: 0 15px;
            transition: all 0.3s ease-out;
        }

        .left-column, .right-column {
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            body {
                padding: 10px;
            }

            .container {
                padding-bottom: 70px;
            }
        }

        .section {
            margin-bottom: 25px;
        }

        .section-title {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 1rem;
                margin-bottom: 12px;
            }
        }

        /* Schedules */
        .schedules-wrapper {
            padding-right: 10px;
            margin-bottom: 20px;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .schedules-wrapper {
                padding-right: 5px;
                margin-bottom: 15px;
                max-height: 50vh;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
        }

        .schedule-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            animation: slideIn 0.5s ease-out backwards;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .schedule-row {
                gap: 10px;
                margin-bottom: 8px;
            }
        }

        .schedule-row:nth-child(1) { animation-delay: 0.05s; }
        .schedule-row:nth-child(2) { animation-delay: 0.06s; }
        .schedule-row:nth-child(3) { animation-delay: 0.07s; }
        .schedule-row:nth-child(4) { animation-delay: 0.08s; }
        .schedule-row:nth-child(5) { animation-delay: 0.09s; }
        .schedule-row:nth-child(6) { animation-delay: 0.1s; }
        .schedule-row:nth-child(7) { animation-delay: 0.11s; }
        .schedule-row:nth-child(8) { animation-delay: 0.12s; }
        .schedule-row:nth-child(9) { animation-delay: 0.13s; }
        .schedule-row:nth-child(10) { animation-delay: 0.14s; }
        .schedule-row:nth-child(11) { animation-delay: 0.15s; }
        .schedule-row:nth-child(12) { animation-delay: 0.16s; }
        .schedule-row:nth-child(13) { animation-delay: 0.17s; }
        .schedule-row:nth-child(14) { animation-delay: 0.18s; }
        .schedule-row:nth-child(15) { animation-delay: 0.19s; }
        .schedule-row:nth-child(16) { animation-delay: 0.2s; }
        .schedule-row:nth-child(17) { animation-delay: 0.21s; }
        .schedule-row:nth-child(18) { animation-delay: 0.22s; }

        .schedule-time {
            color: #ffffff;
            font-size: 0.9rem;
            min-width: 50px;
            font-weight: 500;
            transition: all 0.3s;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .schedule-time {
                font-size: 0.85rem;
                min-width: 45px;
            }
        }

        .schedule-row:hover .schedule-time {
            color: #667eea;
            transform: translateX(5px);
        }

        .schedule-line {
            flex: 1;
            height: 2px;
            background: #4a4a4a;
            position: relative;
            transition: all 0.3s;
            opacity: 1 !important;
        }

        .schedule-row:hover .schedule-line {
            background: #666666;
            height: 3px;
        }

        .schedule-input {
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            padding: 8px 5px;
            transition: all 0.3s;
            min-height: 40px;
            opacity: 1 !important;
        }

        .schedule-input:focus {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .schedule-input::placeholder {
            color: #666666;
        }

        @media (max-width: 768px) {
            .schedule-input {
                font-size: 0.9rem;
                padding: 10px 5px;
            }
        }

        /* Priorities */
        .priorities-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 1 !important;
        }

        .priority-row {
            display: flex;
            align-items: center;
            gap: 12px;
            opacity: 1 !important;
        }

        .priority-dots {
            display: flex;
            gap: 5px;
            min-width: 40px;
        }

        .priority-dot {
            width: 10px;
            height: 10px;
            background: #4a4a4a;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 1 !important;
        }

        .priority-dot:hover {
            transform: scale(1.4);
        }

        .priority-dot.high {
            background: #ff6b6b;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-dot.medium {
            background: #ffd93d;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-dot.low {
            background: #6bcb77;
            animation: glow 2s ease-in-out infinite;
        }

        .priority-line {
            flex: 1;
            height: 2px;
            background: #4a4a4a;
            position: relative;
            opacity: 1 !important;
        }

        .priority-input {
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            padding: 8px 5px;
            min-height: 40px;
            opacity: 1 !important;
        }

        .priority-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .priority-input::placeholder {
            color: #666666;
        }

        @media (max-width: 768px) {
            .priority-input {
                font-size: 0.9rem;
                padding: 10px 5px;
            }

            .priority-dot {
                width: 12px;
                height: 12px;
            }
        }

        /* To-Do List */
        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 1 !important;
        }

        .todo-item {
            background: #e8e0d0;
            padding: 12px 15px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 48px;
            transition: all 0.3s;
            animation: slideIn 0.5s ease-out backwards;
            opacity: 1 !important;
        }

        @media (max-width: 768px) {
            .todo-item {
                padding: 14px 15px;
                min-height: 52px;
            }
        }

        .todo-item:nth-child(1) { animation-delay: 0.05s; }
        .todo-item:nth-child(2) { animation-delay: 0.06s; }
        .todo-item:nth-child(3) { animation-delay: 0.07s; }
        .todo-item:nth-child(4) { animation-delay: 0.08s; }
        .todo-item:nth-child(5) { animation-delay: 0.09s; }
        .todo-item:nth-child(6) { animation-delay: 0.1s; }
        .todo-item:nth-child(7) { animation-delay: 0.11s; }
        .todo-item:nth-child(8) { animation-delay: 0.12s; }

        .todo-item:hover {
            transform: translateX(5px);
            box-shadow: 2px 2px 8px rgba(232, 224, 208, 0.3);
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s;
            min-width: 20px;
            min-height: 20px;
            opacity: 1 !important;
        }

        .todo-checkbox:hover {
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .todo-checkbox {
                width: 22px;
                height: 22px;
                min-width: 22px;
                min-height: 22px;
            }
        }

        .todo-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #1a1a2e;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            min-height: 24px;
            opacity: 1 !important;
        }

        .todo-input::placeholder {
            color: #666666;
        }

        @media (max-width: 768px) {
            .todo-input {
                font-size: 1rem;
            }
        }

        .todo-input.completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* Notes */
        .notes-area {
            width: 100%;
            height: 180px;
            background: #e8e0d0;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 0.95rem;
            color: #1a1a2e;
            resize: vertical;
            outline: none;
            font-family: inherit;
            line-height: 1.5;
            transition: all 0.3s;
            opacity: 1 !important;
        }

        .notes-area:focus {
            box-shadow: 0 0 0 3px rgba(232, 224, 208, 0.5);
            transform: scale(1.02);
        }

        .notes-area::placeholder {
            color: #666666;
        }

        @media (max-width: 768px) {
            .notes-area {
                height: 150px;
                padding: 12px;
                font-size: 1rem;
            }
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 35px 20px 30px;
            flex-wrap: wrap;
        }

        @keyframes float-up {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .action-buttons {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: rgba(15, 15, 35, 0.98);
                padding: 14px 12px;
                gap: 8px;
                z-index: 100;
                box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
                backdrop-filter: blur(20px);
                border-top: 1px solid rgba(255, 255, 255, 0.05);
            }
        }

        .btn {
            padding: 14px 28px;
            border: none;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            text-transform: uppercase;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: translateY(1px) scale(0.98) !important;
        }

        /* Ripple effect on click */
        .btn .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .btn {
                padding: 14px 20px;
                font-size: 0.75rem;
                min-height: 52px;
                flex: 1;
                min-width: 0;
                border-radius: 8px;
                letter-spacing: 0.8px;
            }
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Professional Button Colors */
        .btn-save {
            background: #10b981;
            color: #ffffff;
        }

        .btn-save:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
        }

        .btn-load {
            background: #6366f1;
            color: #ffffff;
        }

        .btn-load:hover {
            background: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .btn-clear {
            background: #ef4444;
            color: #ffffff;
        }

        .btn-clear:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.35);
        }

        .btn-export {
            background: #8b5cf6;
            color: #ffffff;
        }

        .btn-export:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.35);
        }

        @media (max-width: 768px) {
            .btn-save:hover,
            .btn-load:hover,
            .btn-clear:hover,
            .btn-export:hover {
                transform: translateY(-1px);
            }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 25px 20px;
            color: #666666;
            font-size: 0.9rem;
            position: relative;
            margin-top: 20px;
        }

        .footer span {
            color: #ffffff;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, #764ba2, #f093fb, transparent);
            animation: shimmer-line 2s ease-in-out infinite;
        }

        @keyframes gradient-shift {
            0%, 100% {
                filter: hue-rotate(0deg);
            }
            50% {
                filter: hue-rotate(30deg);
            }
        }

        @keyframes shimmer-line {
            0% {
                background-position: -100px 0;
            }
            100% {
                background-position: 100px 0;
            }
        }

        /* Professional Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #0f0f23 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
            overflow: hidden;
        }

        .splash-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(90deg, rgba(102, 126, 234, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(102, 126, 234, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }
            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        .splash-screen.hide {
            opacity: 0;
            visibility: hidden;
        }

        /* Gradient orbs */
        .splash-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: orb-float 8s ease-in-out infinite;
        }

        .splash-orb-1 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.4) 0%, transparent 70%);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .splash-orb-2 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(240, 147, 251, 0.3) 0%, transparent 70%);
            bottom: -125px;
            right: -125px;
            animation-delay: 2s;
        }

        .splash-orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(107, 203, 119, 0.2) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes orb-float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Main container */
        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Logo mark */
        .splash-mark {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
        }

        .splash-mark-svg {
            width: 100%;
            height: 100%;
        }

        .splash-mark-circle {
            fill: none;
            stroke: url(#splash-gradient);
            stroke-width: 3;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: circle-draw 2s ease-out 0.5s forwards;
        }

        @keyframes circle-draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        .splash-mark-check {
            fill: none;
            stroke: url(#splash-gradient);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: check-draw 0.8s ease-out 2s forwards;
        }

        @keyframes check-draw {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Logo text */
        .splash-brand {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: brand-reveal 1s ease-out 1.5s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes brand-reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .splash-product {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: product-reveal 1s ease-out 1.8s forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes product-reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading indicator */
        .splash-loader {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
        }

        .splash-bar {
            width: 4px;
            height: 30px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
            animation: bar-pulse 1.2s ease-in-out infinite;
        }

        .splash-bar:nth-child(1) { animation-delay: 0s; }
        .splash-bar:nth-child(2) { animation-delay: 0.1s; }
        .splash-bar:nth-child(3) { animation-delay: 0.2s; }
        .splash-bar:nth-child(4) { animation-delay: 0.3s; }
        .splash-bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes bar-pulse {
            0%, 100% {
                transform: scaleY(0.4);
                opacity: 0.5;
            }
            50% {
                transform: scaleY(1);
                opacity: 1;
            }
        }

        /* Version tag */
        .splash-version {
            position: absolute;
            bottom: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            animation: version-fade 1s ease-out 2.5s forwards;
            opacity: 0;
        }

        @keyframes version-fade {
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .splash-brand {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .splash-product {
                font-size: 1rem;
                letter-spacing: 6px;
            }

            .splash-mark {
                width: 80px;
                height: 80px;
            }

            .splash-bar {
                width: 3px;
                height: 25px;
            }
        }

        @media (max-width: 768px) {
            .footer {
                padding: 20px 15px;
                font-size: 0.8rem;
                padding-bottom: 100px;
            }

            .footer span {
                font-size: 0.95rem;
            }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #6bcb77;
            color: #fff;
            padding: 12px 20px;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-size: 0.9rem;
            animation: pulse 0.5s ease-out;
        }

        .notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .notification {
                top: 10px;
                right: 10px;
                left: 10px;
                transform: translateY(-150%);
                text-align: center;
            }

            .notification.show {
                transform: translateY(0);
            }
        }

        .add-more-btn {
            background: transparent;
            color: #666666;
            border: 1px solid #4a4a4a;
            padding: 10px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
        }

        .add-more-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
            transform: translateX(5px);
            box-shadow: 3px 0 10px rgba(255, 255, 255, 0.2);
        }

        .add-more-btn:active {
            transform: translateX(3px);
        }

        @media (max-width: 768px) {
            .add-more-btn {
                padding: 12px 20px;
                font-size: 0.9rem;
                min-height: 44px;
            }
        }

        /* Export mode - hide buttons when exporting */
        body.exporting .action-buttons,
        body.exporting .add-more-btn {
            display: none !important;
        }

        body.exporting .container {
            box-shadow: none;
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splash-screen">

        <div class="splash-version">VERSION 2.0</div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">

                <button class="day-btn" data-day="tuesday">T</button>

                <button class="day-btn" data-day="friday">F</button>

            <div class="day-dots">
                <div class="day-dot active" data-day="monday"></div>
                <div class="day-dot" data-day="tuesday"></div>
                <div class="day-dot" data-day="wednesday"></div>
                <div class="day-dot" data-day="thursday"></div>
                <div class="day-dot" data-day="friday"></div>
                <div class="day-dot" data-day="saturday"></div>

        <div class="main-content">

            <div class="left-column">

            <div class="right-column">

                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="0">
                            </div>
                        </div>
                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="1">
                            </div>
                        </div>
                        <div class="priority-row">
                            <div class="priority-dots">
                                <div class="priority-dot" onclick="cyclePriority(this, 0)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 1)"></div>
                                <div class="priority-dot" onclick="cyclePriority(this, 2)"></div>
                            </div>
                            <div class="priority-line">
                                <input type="text" class="priority-input" placeholder="" data-index="2">

                        </div>

                <div class="section">
                    <h2 class="section-title">To-Do List</h2>
                    <div class="todo-list" id="todo-container">
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>
                        <div class="todo-item">
                            <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                            <input type="text" class="todo-input" placeholder="">
                        </div>

                    <button class="add-more-btn" onclick="addTodo()">+ Add more</button>

                <div class="section">
                    <h2 class="section-title">Notes</h2>
                    <textarea class="notes-area" id="notes" placeholder=""></textarea>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-save" onclick="saveDay()">Save</button>
            <button class="btn btn-load" onclick="loadDay()">Load</button>
            <button class="btn btn-clear" onclick="clearDay()">Clear</button>
            <button class="btn btn-export" onclick="exportAsImage()">Export</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>✨ Daily Planner ✨</span>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script>
        let currentDay = 'monday';
        let priorityStates = [[0,0,0], [0,0,0], [0,0,0]];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Show splash screen
            const splashScreen = document.getElementById('splash-screen');
            const loadingText = document.querySelector('.splash-loading');

            // Show loading text after delay
            setTimeout(() => {
                loadingText.classList.add('show');
            }, 1500);

            // Hide splash screen after 3.5 seconds
            setTimeout(() => {
                splashScreen.classList.add('hide');

                // Remove splash screen from DOM after animation completes
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                }, 1000);
            }, 3500);

            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;

            // Generate time slots
            generateTimeSlots();

            // Load saved data for Monday
            loadDay();
        });

        // Generate Time Slots
        function generateTimeSlots() {
            const container = document.getElementById('schedules-container');
            container.innerHTML = '';

            const timeSlots = [
                '6:00', '7:00', '8:00', '9:00', '10:00', '11:00',
                '12:00', '1:00', '2:00', '3:00', '4:00', '5:00',
                '6:00', '7:00', '8:00', '9:00', '10:00', '11:00'
            ];

            timeSlots.forEach((time, index) => {
                const scheduleRow = document.createElement('div');
                scheduleRow.className = 'schedule-row';
                scheduleRow.innerHTML = `
                    <span class="schedule-time">${time}</span>
                    <div class="schedule-line">
                        <input type="text" class="schedule-input" placeholder="" data-index="${index}">
                    </div>
                `;
                container.appendChild(scheduleRow);
            });
        }

        // Day Selection
        document.querySelectorAll('.day-btn, .day-dot').forEach(element => {
            element.addEventListener('click', function() {
                // Save current day before switching
                saveDay();

                // Fade out main content
                const mainContent = document.querySelector('.main-content');
                mainContent.style.opacity = '0';
                mainContent.style.transform = 'translateY(10px)';
                mainContent.style.transition = 'all 0.3s ease-out';

                setTimeout(() => {
                    // Update current day
                    currentDay = this.dataset.day;

                    // Update UI
                    document.querySelectorAll('.day-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if(btn.dataset.day === currentDay) btn.classList.add('active');
                    });

                    document.querySelectorAll('.day-dot').forEach(dot => {
                        dot.classList.remove('active');
                        if(dot.dataset.day === currentDay) dot.classList.add('active');
                    });

                    // Load new day's data
                    loadDay();

                    // Fade in main content
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                        mainContent.style.transform = 'translateY(0)';
                    }, 50);
                }, 300);
            });
        });

        // Add To-Do
        function addTodo() {
            const container = document.getElementById('todo-container');
            const todoItem = document.createElement('div');
            todoItem.className = 'todo-item';
            todoItem.style.animation = 'slideIn 0.5s ease-out';
            todoItem.innerHTML = `
                <input type="checkbox" class="todo-checkbox" onchange="toggleTodo(this)">
                <input type="text" class="todo-input" placeholder="">
            `;
            container.appendChild(todoItem);

            // Focus on the new input
            setTimeout(() => {
                const input = todoItem.querySelector('.todo-input');
                input.focus();
            }, 100);
        }

        // Toggle To-Do
        function toggleTodo(checkbox) {
            const input = checkbox.nextElementSibling;
            if (checkbox.checked) {
                input.classList.add('completed');
            } else {
                input.classList.remove('completed');
            }
        }

        // Cycle Priority
        function cyclePriority(dot, index) {
            const row = dot.closest('.priority-row');
            const dots = row.querySelectorAll('.priority-dot');
            const input = row.querySelector('.priority-input');
            const rowIndex = Array.from(document.querySelectorAll('.priority-row')).indexOf(row);

            // Toggle this dot
            if (dot.classList.contains('high')) {
                dot.classList.remove('high');
                priorityStates[rowIndex][index] = 0;
            } else {
                // Clear all dots in this row
                dots.forEach(d => d.classList.remove('high', 'medium', 'low'));
                // Set this dot as high
                dot.classList.add('high');
                priorityStates[rowIndex] = [0, 0, 0];
                priorityStates[rowIndex][index] = 3;
            }
        }

        // Save Day
        function saveDay() {
            const data = {
                date: document.getElementById('date').value,
                schedules: [],
                priorities: [],
                todos: [],
                notes: document.getElementById('notes').value
            };

            // Collect schedules
            document.querySelectorAll('.schedule-input').forEach(input => {
                const value = input.value.trim();
                if (value) {
                    data.schedules.push({
                        index: input.dataset.index,
                        value: value
                    });
                }
            });

            // Collect priorities
            document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                const input = row.querySelector('.priority-input');
                const value = input.value.trim();
                const dots = row.querySelectorAll('.priority-dot');
                const priorities = [];

                dots.forEach((dot, dotIndex) => {
                    if (dot.classList.contains('high')) priorities.push(3);
                    else if (dot.classList.contains('medium')) priorities.push(2);
                    else if (dot.classList.contains('low')) priorities.push(1);
                    else priorities.push(0);
                });

                if (value || priorities.some(p => p > 0)) {
                    data.priorities.push({
                        index: rowIndex,
                        value: value,
                        priorities: priorities
                    });
                }
            });

            // Collect to-dos
            document.querySelectorAll('.todo-item').forEach((item, index) => {
                const checkbox = item.querySelector('.todo-checkbox').checked;
                const input = item.querySelector('.todo-input');
                const value = input.value.trim();
                if (value) {
                    data.todos.push({
                        index: index,
                        checked: checkbox,
                        value: value
                    });
                }
            });

            // Save to localStorage
            localStorage.setItem(`timetable_v2_${currentDay}`, JSON.stringify(data));
            showNotification('✓ Saved!');
        }

        // Load Day
        function loadDay() {
            const savedData = localStorage.getItem(`timetable_v2_${currentDay}`);

            if (savedData) {
                const data = JSON.parse(savedData);

                // Load date
                if (data.date) {
                    document.getElementById('date').value = data.date;
                }

                // Load schedules
                document.querySelectorAll('.schedule-input').forEach(input => {
                    input.value = '';
                });
                if (data.schedules) {
                    data.schedules.forEach(schedule => {
                        const input = document.querySelector(`.schedule-input[data-index="${schedule.index}"]`);
                        if (input) input.value = schedule.value;
                    });
                }

                // Load priorities
                document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                    const input = row.querySelector('.priority-input');
                    const dots = row.querySelectorAll('.priority-dot');

                    input.value = '';
                    dots.forEach(dot => dot.classList.remove('high', 'medium', 'low'));
                    priorityStates[rowIndex] = [0, 0, 0];
                });

                if (data.priorities) {
                    data.priorities.forEach(priority => {
                        const row = document.querySelectorAll('.priority-row')[priority.index];
                        if (row) {
                            const input = row.querySelector('.priority-input');
                            const dots = row.querySelectorAll('.priority-dot');

                            input.value = priority.value;
                            priority.priorities.forEach((p, i) => {
                                if (p === 3) dots[i].classList.add('high');
                                else if (p === 2) dots[i].classList.add('medium');
                                else if (p === 1) dots[i].classList.add('low');
                            });
                            priorityStates[priority.index] = priority.priorities;
                        }
                    });
                }

                // Load to-dos
                document.querySelectorAll('.todo-item').forEach((item) => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });

                if (data.todos) {
                    data.todos.forEach(todo => {
                        const items = document.querySelectorAll('.todo-item');
                        if (items[todo.index]) {
                            const checkbox = items[todo.index].querySelector('.todo-checkbox');
                            const input = items[todo.index].querySelector('.todo-input');
                            checkbox.checked = todo.checked;
                            input.value = todo.value;
                            if (todo.checked) input.classList.add('completed');
                        }
                    });
                }

                // Load notes
                document.getElementById('notes').value = data.notes || '';

                showNotification('✓ Loaded!');
            } else {
                // Clear all if no data
                document.querySelectorAll('.schedule-input').forEach(input => input.value = '');
                document.querySelectorAll('.priority-input').forEach(input => input.value = '');
                document.querySelectorAll('.priority-dot').forEach(dot => {
                    dot.classList.remove('high', 'medium', 'low');
                });
                document.querySelectorAll('.todo-item').forEach(item => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });
                document.getElementById('notes').value = '';
            }
        }

        // Clear Day
        function clearDay() {
            if (confirm('Clear all data for ' + currentDay + '?')) {
                localStorage.removeItem(`timetable_v2_${currentDay}`);

                // Reset UI
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
                document.getElementById('notes').value = '';

                document.querySelectorAll('.schedule-input').forEach(input => input.value = '');

                document.querySelectorAll('.priority-row').forEach((row, rowIndex) => {
                    const input = row.querySelector('.priority-input');
                    const dots = row.querySelectorAll('.priority-dot');
                    input.value = '';
                    dots.forEach(dot => dot.classList.remove('high', 'medium', 'low'));
                    priorityStates[rowIndex] = [0, 0, 0];
                });

                document.querySelectorAll('.todo-item').forEach(item => {
                    const checkbox = item.querySelector('.todo-checkbox');
                    const input = item.querySelector('.todo-input');
                    checkbox.checked = false;
                    input.value = '';
                    input.classList.remove('completed');
                });

                showNotification('✓ Cleared!');
            }
        }

        // Show Notification
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Add ripple effect to buttons
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');

                const rect = button.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';

                button.appendChild(ripple);

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });

        // Export as Image
        function exportAsImage() {
            // Save before exporting
            saveDay();

            // Add exporting class to hide buttons
            document.body.classList.add('exporting');

            // Wait a bit for the class to take effect
            setTimeout(() => {
                const container = document.querySelector('.container');

                // Use html2canvas to capture
                html2canvas(container, {
                    backgroundColor: '#000000',
                    scale: 2, // Higher quality
                    useCORS: true,
                    logging: false
                }).then(canvas => {
                    // Remove exporting class
                    document.body.classList.remove('exporting');

                    // Create download link
                    const link = document.createElement('a');
                    const dayName = currentDay.charAt(0).toUpperCase() + currentDay.slice(1);
                    const date = document.getElementById('date').value;
                    link.download = `DailyPlanner_${dayName}_${date}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();

                    showNotification('✓ Image exported!');
                }).catch(error => {
                    console.error('Export error:', error);
                    document.body.classList.remove('exporting');
                    showNotification('✗ Export failed');
                });
            }, 100);
        }
    </script>
</body>
</html>
